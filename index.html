<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Juomapeli</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #14121f;
    color: #fff;
    overflow: hidden;
    user-select: none;
  }
  body { display: flex; align-items: center; justify-content: center; }

  /* ---------- Card ---------- */
  #card {
    position: relative;
    /* 1:1.4 ratio; fill the limiting screen axis fully, keep the ratio */
    width: min(100vw, calc(100vh / 1.4));
    aspect-ratio: 1 / 1.4;
    border-radius: 22px;
    background: linear-gradient(160deg, #6d5dfc, #46337e);
    box-shadow: 0 16px 40px rgba(0,0,0,.5);
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    text-align: center;
    padding: 26px;
    overflow: hidden;
    container-type: size;   /* lets text scale with the card via cqw units */
    cursor: pointer;
    transition: transform .12s ease;
  }
  #card:active { transform: scale(.97); }
  #card.flip { animation: flip .35s ease; }
  @keyframes flip {
    0%   { transform: rotateY(90deg) scale(.9); opacity: 0; }
    100% { transform: rotateY(0deg) scale(1);   opacity: 1; }
  }

  /* small print counter, e.g. 4/27 */
  #card-count {
    position: absolute; top: 12px; right: 16px;
    font-size: 2.8cqw; font-weight: 600;
    color: rgba(255,255,255,.55);
  }

  /* sound toggle, shown only on video cards */
  #sound-btn {
    position: absolute; top: 10px; left: 12px;
    width: 9cqw; height: 9cqw;
    border: none; border-radius: 999px;
    font-size: 4.5cqw; line-height: 9cqw;
    background: rgba(255,255,255,.22); color: #fff;
    cursor: pointer; padding: 0;
  }
  #sound-btn:active { transform: scale(.94); }

  /* card name on top of the image — 2x font */
  #card-name {
    font-size: 10cqw;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 14px;
  }

  /* image area */
  #card-img {
    height: 60%;
    width: 100%;
    margin-bottom: 0;
    display: flex; align-items: center; justify-content: center;
  }
  /* media fits the available area, keeps aspect ratio (no stretch, no card growth) */
  #card-img img,
  #card-img video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 12px;
    display: block;
  }
  #card-img:empty { display: none; }

  /* placeholder shown until a real image exists */
  .placeholder {
    width: 100%; height: 100%;
    border: 2px dashed rgba(255,255,255,.4);
    border-radius: 14px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
    color: rgba(255,255,255,.6);
  }
  .placeholder .ic { font-size: 13cqw; }
  .placeholder .lbl { font-size: 3.2cqw; font-weight: 600; }

  /* description text fills + centers in the space below the image, down to the card edge */
  #card-text {
    flex: 1 1 auto;
    width: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 4.8cqw; font-weight: 600; line-height: 1.3;
  }
  #card-text:empty { display: none; }

  /* drawing canvas (Maalari card) */
  #card-img canvas {
    width: 100%; height: 260px;
    background: #fff;
    border-radius: 12px;
    touch-action: none;
    cursor: crosshair;
  }

  /* Maalari (drawing) card: push everything to the edges, maximize canvas */
  #card.drawing { padding: 12px; justify-content: flex-start; }
  /* no zoom: don't scale on press, don't run the flip/zoom appear animation */
  #card.drawing:active { transform: none; }
  #card.drawing.flip { animation: none; }
  #card.drawing #card-name { margin-bottom: 8px; }
  #card.drawing #card-text { flex: 0 0 auto; display: block; margin: 0 0 8px; }
  #card.drawing #card-img { flex: 1 1 auto; height: auto; min-height: 0; margin: 0 0 8px; }
  #card.drawing #card-img canvas { width: 100%; height: 100%; }

  /* action buttons shown only on the draw card */
  #card-actions {
    display: flex; gap: 10px; margin-top: 14px;
  }
  .mini {
    border: none; border-radius: 10px;
    padding: 10px 18px; font-size: 3.6cqw; font-weight: 700;
    cursor: pointer;
  }
  #clearBtn { background: rgba(255,255,255,.22); color: #fff; }
  #nextBtn  { background: #ffd24d; color: #1d1a2b; }
  .mini:active { transform: scale(.96); }

  /* ---------- Start screen ---------- */
  #setup {
    position: fixed; inset: 0; z-index: 5;
    background: #14121f;
    display: flex; align-items: center; justify-content: center;
  }
  .btn {
    border: none; border-radius: 14px;
    padding: 18px 36px; font-size: 22px; font-weight: 700;
    background: #ffd24d; color: #1d1a2b; cursor: pointer;
  }
  .btn:active { transform: scale(.97); }
  .hidden { display: none !important; }
</style>
</head>
<body>

  <!-- Start screen: only a button -->
  <div id="setup">
    <button class="btn" id="startBtn">Aloita peli</button>
  </div>

  <!-- The card -->
  <div id="card">
    <div id="card-count"></div>
    <button id="sound-btn" class="hidden">🔇</button>
    <div id="card-name">Napauta korttia</div>
    <div id="card-img"></div>
    <div id="card-text"></div>
    <div id="card-actions" class="hidden">
      <button id="clearBtn" class="mini">Tyhjennä</button>
      <button id="nextBtn" class="mini">Seuraava kortti</button>
    </div>
  </div>

<script src="cards.js"></script>
<script>
  let lastCard = -1;
  let drawingMode = false;   // true while the Maalari (draw) card is showing
  let currentVideo = null;   // <video> on the current card, if any
  const played = new Set();

  const $ = (id) => document.getElementById(id);

  $("startBtn").addEventListener("click", () => {
    $("setup").classList.add("hidden");
    updateCount();
    drawCard();
  });

  $("card").addEventListener("click", () => {
    if (!$("setup").classList.contains("hidden")) return;
    if (drawingMode) return;   // on the draw card, advance only via "Seuraava kortti"
    drawCard();
  });

  // Buttons used by the Maalari draw card
  $("clearBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    clearCanvas();
  });
  $("nextBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    drawCard();
  });

  // Sound toggle for video cards
  $("sound-btn").addEventListener("click", (e) => {
    e.stopPropagation();
    if (!currentVideo) return;
    currentVideo.muted = !currentVideo.muted;
    if (!currentVideo.muted) currentVideo.play().catch(() => {});
    updateSoundIcon();
  });

  function updateSoundIcon() {
    $("sound-btn").textContent = (currentVideo && !currentVideo.muted) ? "🔊" : "🔇";
  }

  function drawCard() {
    if (!CARDS || CARDS.length === 0) {
      $("card-text").textContent = "Lisää kortteja cards.js-tiedostoon";
      $("card-img").textContent = "📝";
      return;
    }
    let i = Math.floor(Math.random() * CARDS.length);
    if (CARDS.length > 1) {
      while (i === lastCard) i = Math.floor(Math.random() * CARDS.length);
    }
    lastCard = i;
    played.add(i);
    showCard(CARDS[i]);
    updateCount();
  }

  function updateCount() {
    $("card-count").textContent = played.size + "/" + (CARDS ? CARDS.length : 0);
  }

  function showCard(card) {
    const imgEl = $("card-img");

    $("card-name").textContent = card.name || "";
    $("card-text").textContent = card.text || "";

    // reset video/sound state for each new card
    currentVideo = null;
    $("sound-btn").classList.add("hidden");

    if (card.draw) {
      // special card: drawable canvas instead of an image
      drawingMode = true;
      $("card").classList.add("drawing");
      $("card-actions").classList.remove("hidden");
      imgEl.innerHTML = "";
      buildCanvas(imgEl);
    } else {
      drawingMode = false;
      $("card").classList.remove("drawing");
      $("card-actions").classList.add("hidden");

      const media = (card.image || "").trim();
      const isVideo = /\.(mp4|webm|ogv|mov)$/i.test(media);
      const isImage = /^(https?:\/\/|images\/|\.\/|\/)|\.(png|jpe?g|gif|webp|svg)$/i.test(media);
      if (isVideo) {
        // video card (e.g. .mp4), with a placeholder fallback if the file is missing
        imgEl.innerHTML =
          `<video src="${escapeHtml(media)}" autoplay playsinline onerror="this.replaceWith(makePlaceholder())"></video>`;
        currentVideo = imgEl.querySelector("video");
        if (currentVideo) {
          // play with sound on the first run; after it finishes, mute and loop silently
          currentVideo.muted = false;
          currentVideo.play().catch(() => {
            currentVideo.muted = true;          // sound blocked → fall back to muted
            currentVideo.loop = true;
            currentVideo.play().catch(() => {});
            updateSoundIcon();
          });
          currentVideo.addEventListener("ended", () => {
            currentVideo.muted = true;
            currentVideo.loop = true;
            currentVideo.currentTime = 0;
            currentVideo.play().catch(() => {});
            updateSoundIcon();
          }, { once: true });
        }
        $("sound-btn").classList.remove("hidden");
        updateSoundIcon();
      } else if (isImage) {
        // real image, with a placeholder fallback if the file is missing
        imgEl.innerHTML =
          `<img src="${escapeHtml(media)}" alt="" onerror="this.replaceWith(makePlaceholder())">`;
      } else {
        imgEl.innerHTML = "";
        imgEl.appendChild(makePlaceholder());
      }
    }

    const c = $("card");
    c.classList.remove("flip");
    void c.offsetWidth;
    c.classList.add("flip");
  }

  // ---- Drawing canvas (Maalari card) ----
  let dctx = null;   // current canvas 2D context

  function buildCanvas(container) {
    const canvas = document.createElement("canvas");
    container.appendChild(canvas);
    // match drawing resolution to the on-screen size
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;

    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#222";
    dctx = ctx;

    let drawing = false, lx = 0, ly = 0;
    const pos = (e) => {
      const r = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - r.left) * (canvas.width / r.width),
        y: (e.clientY - r.top)  * (canvas.height / r.height)
      };
    };
    canvas.addEventListener("pointerdown", (e) => {
      e.stopPropagation();                 // don't trigger card tap
      drawing = true;
      const p = pos(e); lx = p.x; ly = p.y;
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener("pointermove", (e) => {
      if (!drawing) return;
      const p = pos(e);
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      lx = p.x; ly = p.y;
    });
    const stop = () => { drawing = false; };
    canvas.addEventListener("pointerup", stop);
    canvas.addEventListener("pointercancel", stop);
    canvas.addEventListener("click", (e) => e.stopPropagation());
  }

  function clearCanvas() {
    if (!dctx) return;
    dctx.fillStyle = "#fff";
    dctx.fillRect(0, 0, dctx.canvas.width, dctx.canvas.height);
  }

  function makePlaceholder() {
    const d = document.createElement("div");
    d.className = "placeholder";
    d.innerHTML = `<div class="ic">🖼️</div><div class="lbl">Kuva tulossa</div>`;
    return d;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
  }
</script>
</body>
</html>
