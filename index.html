<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Juomapeli</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #14121f;
    color: #fff;
    overflow: hidden;
    user-select: none;
  }
  body { display: flex; align-items: center; justify-content: center; padding: 20px; }

  /* ---------- Card ---------- */
  #card {
    position: relative;
    width: min(86vw, 460px);
    aspect-ratio: 3 / 4;
    border-radius: 22px;
    background: linear-gradient(160deg, #6d5dfc, #46337e);
    box-shadow: 0 16px 40px rgba(0,0,0,.5);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 26px;
    cursor: pointer;
    transition: transform .12s ease;
  }
  #card:active { transform: scale(.97); }
  #card.flip { animation: flip .35s ease; }
  @keyframes flip {
    0%   { transform: rotateY(90deg) scale(.9); opacity: 0; }
    100% { transform: rotateY(0deg) scale(1);   opacity: 1; }
  }

  /* small print counter, e.g. 4/27 */
  #card-count {
    position: absolute; top: 12px; right: 16px;
    font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,.55);
  }

  /* card name on top of the image — 2x font */
  #card-name {
    font-size: 50px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 14px;
  }

  /* image area */
  #card-img {
    font-size: 190px;
    line-height: 1;
    margin-bottom: 14px;
    width: 95%;
    height: 48%;
    display: flex; align-items: center; justify-content: center;
  }
  #card-img img { max-width: 100%; max-height: 100%; border-radius: 12px; }
  #card-img:empty { display: none; }

  /* placeholder shown until a real image exists */
  .placeholder {
    width: 100%; height: 100%;
    border: 2px dashed rgba(255,255,255,.4);
    border-radius: 14px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
    color: rgba(255,255,255,.6);
  }
  .placeholder .ic { font-size: 64px; }
  .placeholder .lbl { font-size: 15px; font-weight: 600; }

  #card-text { font-size: 22px; font-weight: 600; line-height: 1.3; }
  #card-text:empty { display: none; }

  /* ---------- Start screen ---------- */
  #setup {
    position: fixed; inset: 0; z-index: 5;
    background: #14121f;
    display: flex; align-items: center; justify-content: center;
  }
  .btn {
    border: none; border-radius: 14px;
    padding: 18px 36px; font-size: 22px; font-weight: 700;
    background: #ffd24d; color: #1d1a2b; cursor: pointer;
  }
  .btn:active { transform: scale(.97); }
  .hidden { display: none !important; }
</style>
</head>
<body>

  <!-- Start screen: only a button -->
  <div id="setup">
    <button class="btn" id="startBtn">Aloita peli</button>
  </div>

  <!-- The card -->
  <div id="card">
    <div id="card-count"></div>
    <div id="card-name">Napauta korttia</div>
    <div id="card-img"></div>
    <div id="card-text"></div>
  </div>

<script src="cards.js"></script>
<script>
  let lastCard = -1;
  const played = new Set();

  const $ = (id) => document.getElementById(id);

  $("startBtn").addEventListener("click", () => {
    $("setup").classList.add("hidden");
    updateCount();
    drawCard();
  });

  $("card").addEventListener("click", () => {
    if (!$("setup").classList.contains("hidden")) return;
    drawCard();
  });

  function drawCard() {
    if (!CARDS || CARDS.length === 0) {
      $("card-text").textContent = "Lisää kortteja cards.js-tiedostoon";
      $("card-img").textContent = "📝";
      return;
    }
    let i = Math.floor(Math.random() * CARDS.length);
    if (CARDS.length > 1) {
      while (i === lastCard) i = Math.floor(Math.random() * CARDS.length);
    }
    lastCard = i;
    played.add(i);
    showCard(CARDS[i]);
    updateCount();
  }

  function updateCount() {
    $("card-count").textContent = played.size + "/" + (CARDS ? CARDS.length : 0);
  }

  function showCard(card) {
    const imgEl = $("card-img");
    const img = (card.image || "").trim();
    const isFile = /^(https?:\/\/|images\/|\.\/|\/)|\.(png|jpe?g|gif|webp|svg)$/i.test(img);

    if (isFile) {
      // real image, with a placeholder fallback if the file is missing
      imgEl.innerHTML =
        `<img src="${escapeHtml(img)}" alt="" onerror="this.replaceWith(makePlaceholder())">`;
    } else {
      imgEl.innerHTML = "";
      imgEl.appendChild(makePlaceholder());
    }

    $("card-name").textContent = card.name || "";
    $("card-text").textContent = card.text || "";

    const c = $("card");
    c.classList.remove("flip");
    void c.offsetWidth;
    c.classList.add("flip");
  }

  function makePlaceholder() {
    const d = document.createElement("div");
    d.className = "placeholder";
    d.innerHTML = `<div class="ic">🖼️</div><div class="lbl">Kuva tulossa</div>`;
    return d;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
  }
</script>
</body>
</html>
